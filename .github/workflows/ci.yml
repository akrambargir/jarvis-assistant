name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Rust core (all platforms share the same logic) ──────────────────────────
  rust-test:
    name: Rust core tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis_assistant
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jarvis_assistant
      - run: cargo test --workspace

  # ── Android ─────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jarvis_assistant
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Flutter pub get
        working-directory: jarvis_assistant
        run: flutter pub get
      - name: Build APK (release)
        working-directory: jarvis_assistant
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-assistant-android
          path: jarvis_assistant/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── iOS ──────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jarvis_assistant
      - name: Flutter pub get
        working-directory: jarvis_assistant
        run: flutter pub get
      - name: Build iOS (no-codesign)
        working-directory: jarvis_assistant
        run: flutter build ios --debug --no-codesign

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jarvis_assistant
      - name: Flutter pub get
        working-directory: jarvis_assistant
        run: flutter pub get
      - name: Build Windows
        working-directory: jarvis_assistant
        run: flutter build windows --debug

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-14
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jarvis_assistant
      - name: Flutter pub get
        working-directory: jarvis_assistant
        run: flutter pub get
      - name: Build macOS
        working-directory: jarvis_assistant
        run: flutter build macos --debug

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jarvis_assistant
      - name: Flutter pub get
        working-directory: jarvis_assistant
        run: flutter pub get
      - name: Build Linux
        working-directory: jarvis_assistant
        run: flutter build linux --debug
